{% extends "base.html" %}
{% block content %}
<section class="ops-page-grid">
  <article class="panel ops-kpi-strip">
    <div><span>Production</span><strong data-live="dashboard.production_tons" data-format="tons">0</strong></div>
    <div><span>Target</span><strong data-live="dashboard.production_target_tons" data-format="tons">0</strong></div>
    <div><span>Rate to Packaging</span><strong data-live="process.flow.dry_to_packaging" data-format="rate-ton">0</strong></div>
    <div><span>Revenue</span><strong data-live="dashboard.revenue_today" data-format="currency">0</strong></div>
  </article>
  <article class="panel ops-wide-panel"><div class="panel-header"><h2>Material Balance</h2><span class="live-dot">Live</span></div><div class="material-flow-grid" data-live-list="material-flow"></div></article>
  <article class="panel"><h2>Bottleneck</h2><div class="summary-list"><div><span>Current</span><strong data-live="dashboard.bottleneck">Dryer</strong></div><div><span>Loss</span><strong data-live="dashboard.bottleneck_loss_percent" data-format="percent">0</strong></div><div><span>Lost Profit</span><strong data-live="dashboard.lost_profit_opportunity" data-format="currency">0</strong></div></div></article>
</section>
{% endblock %}
