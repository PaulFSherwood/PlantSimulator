{% extends "base.html" %}
{% block content %}
<section class="ops-page-grid">
  <article class="panel ops-wide-panel">
    <div class="panel-header"><div><h2>Equipment Status</h2><p>Live equipment state from the in-memory simulator.</p></div><span class="live-dot">Live</span></div>
    <div class="table-wrap">
      <table class="data-table ops-table">
        <thead><tr><th>Equipment</th><th>Kind</th><th>Status</th><th>Runtime</th><th>Health</th><th>Load</th><th>Temp</th><th>Actions</th></tr></thead>
        <tbody data-live-list="equipment-full"></tbody>
      </table>
    </div>
  </article>
  <article class="panel"><h2>Operator Notes</h2><p class="muted">Start/stop changes are immediate. Lockout blocks start commands until cleared.</p><div class="event-log" data-live-list="event-log"></div></article>
</section>
{% endblock %}
