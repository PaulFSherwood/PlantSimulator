{% extends "base.html" %}
{% block content %}
<section class="ops-page-grid">
  <article class="panel ops-wide-panel"><div class="panel-header"><h2>Live Production Samples</h2><span class="live-dot">Live</span></div><div class="simple-live-chart large-chart" data-live-chart="production"></div></article>
  <article class="panel"><h2>Current Sensors</h2><div class="summary-list"><div><span>Dryer Temp</span><strong data-live="process.dryer_temp_f" data-format="temp-f">0</strong></div><div><span>Wet Bin</span><strong data-live="process.wet_bin_fill" data-format="percent">0</strong></div><div><span>Dry Bin</span><strong data-live="process.dry_bin_fill" data-format="percent">0</strong></div><div><span>Packaging</span><strong data-live="process.packaging_bag_hr" data-format="bags-hour">0</strong></div></div></article>
</section>
{% endblock %}
