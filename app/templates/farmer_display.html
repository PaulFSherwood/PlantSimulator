{% extends "base.html" %}
{% block content %}
<section class="farmer-board">
  <div class="farmer-header"><h2>{{ plant_name }}</h2><span data-live="plant.status">Receiving Open</span></div>
  <div class="farmer-grid"><div><span>Receiving Rate</span><strong data-live="process.receiving_rate_bu_hr" data-format="rate-bu">0</strong></div><div><span>Wet Bin</span><strong data-live="process.wet_bin_fill" data-format="percent">0</strong></div><div><span>Current Shift</span><strong data-live="plant.shift">Day Shift</strong></div></div>
  <div class="farmer-message">Proceed to scale when directed by yard staff.</div>
</section>
{% endblock %}
